[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -ra --strict-markers --tb=short
markers =
    slow: tests that take significantly longer than the unit suite
    integration: tests that exercise multiple project components
    unit: isolated unit tests
    gpu: tests that require a GPU
    pipeline: tests critical to the release pipeline
