services:
  api:
    build:
      context: .
    image: graffiti-detection-ai:${IMAGE_TAG:-local}
    ports:
      - "${API_PORT:-8000}:8000"
    volumes:
      - ./models:/app/models:ro
      - detection-output:/app/outputs
    environment:
      MODEL_PATH: /app/models/best.pt
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    restart: unless-stopped

  surveillance:
    profiles: ["surveillance"]
    build:
      context: .
    image: graffiti-detection-ai:${IMAGE_TAG:-local}
    command:
      - python
      - scripts/multi_camera_surveillance.py
      - --model
      - /app/models/best.pt
      - --cameras
      - /app/configs/cameras.json
      - --alert-config
      - /app/configs/alerts.json
    volumes:
      - ./models:/app/models:ro
      - ./configs:/app/configs:ro
      - detection-output:/app/outputs
    environment:
      TZ: ${TZ:-UTC}
    restart: unless-stopped

volumes:
  detection-output:
