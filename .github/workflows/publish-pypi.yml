name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release version without the v prefix
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: release-${{ inputs.version }}
  cancel-in-progress: false

jobs:
  build:
    name: Validate release
    runs-on: ubuntu-24.04

    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Verify release version
        shell: bash
        env:
          RELEASE_VERSION: ${{ inputs.version }}
        run: |
          test "$GITHUB_REF" = "refs/heads/main" || {
            echo "Releases must be dispatched from main" >&2
            exit 1
          }
          [[ "$RELEASE_VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]] || {
            echo "Version must use MAJOR.MINOR.PATCH format" >&2
            exit 1
          }
          package_version=$(python -c 'import runpy; print(runpy.run_path("graffiti_detection/_version.py")["__version__"])')
          test "$RELEASE_VERSION" = "$package_version" || {
            echo "Requested $RELEASE_VERSION does not match package $package_version" >&2
            exit 1
          }
          if git rev-parse "v$RELEASE_VERSION" >/dev/null 2>&1; then
            test "$(git rev-list -n 1 "v$RELEASE_VERSION")" = "$GITHUB_SHA" || {
              echo "Tag v$RELEASE_VERSION points to another commit" >&2
              exit 1
            }
          fi
          git merge-base --is-ancestor "$GITHUB_SHA" origin/main || {
            echo "Release commit is not on origin/main" >&2
            exit 1
          }

      - name: Install release dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run release checks
        run: |
          ruff check .
          ruff format --check .
          pytest -q -m "not gpu"

      - name: Build distributions
        run: python -m build

      - name: Validate package metadata
        run: twine check --strict dist/*

      - name: Upload distributions
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: python-package-distributions
          path: dist/
          if-no-files-found: error

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-24.04
    environment:
      name: pypi
      url: https://pypi.org/p/graffiti-detection-ai-model
    permissions:
      id-token: write

    steps:
      - name: Download distributions
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
        with:
          skip-existing: true

  github-release:
    name: Publish GitHub release
    needs: publish
    runs-on: ubuntu-24.04
    permissions:
      contents: write

    steps:
      - name: Download distributions
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: python-package-distributions
          path: dist/

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: v${{ inputs.version }}
        run: |
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" dist/* --clobber
          else
            gh release create "$RELEASE_TAG" dist/* \
              --generate-notes \
              --target "$GITHUB_SHA" \
              --title "$RELEASE_TAG"
          fi
