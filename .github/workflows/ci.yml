name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.11"]

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            requirements.txt
            pyproject.toml

      - name: Upgrade packaging tools
        run: python -m pip install --upgrade pip setuptools wheel

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install test/build tools
        run: pip install pytest build twine

      - name: Run tests
        run: pytest tests/ -q -m "not gpu"

      - name: Build package
        run: python -m build

      - name: Validate package metadata
        run: twine check dist/*

      - name: Verify wheel install and import smoke test
        if: matrix.python-version == '3.11'
        run: |
          python -m pip install --force-reinstall dist/*.whl
          python -c "from graffiti_detection import __version__; from graffiti_detection.evaluation.metrics import calculate_iou; import numpy as np; assert __version__ == '0.1.2'; assert calculate_iou(np.array([0,0,1,1]), np.array([0,0,1,1])) == 1.0"
