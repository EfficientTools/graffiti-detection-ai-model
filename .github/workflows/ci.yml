name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test Python ${{ matrix.python-version }}
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13"]

    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install development dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Check code quality
        if: matrix.python-version == '3.13'
        run: |
          ruff check .
          ruff format --check .

      - name: Audit dependency vulnerabilities
        if: matrix.python-version == '3.13'
        run: pip-audit --local --progress-spinner off

      - name: Run test suite
        run: pytest -q -m "not gpu"

  package:
    name: Validate package
    needs: test
    runs-on: ubuntu-24.04

    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install packaging tools
        run: python -m pip install --upgrade build twine

      - name: Build distributions
        run: python -m build

      - name: Validate package metadata
        run: twine check --strict dist/*

      - name: Verify wheel installation
        run: |
          python -m venv /tmp/wheel-smoke
          /tmp/wheel-smoke/bin/python -m pip install --upgrade pip
          wheel=$(echo dist/*.whl)
          /tmp/wheel-smoke/bin/python -m pip install "${wheel}[api]"
          cd /tmp
          /tmp/wheel-smoke/bin/python -c "from importlib.metadata import version; from graffiti_detection import __version__; from graffiti_detection.api import app; assert version('graffiti-detection-ai-model') == __version__; assert app.title == 'Graffiti Detection API'"

      - name: Upload distributions
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: python-package-distributions
          path: dist/
          if-no-files-found: error

  container:
    name: Validate container
    needs: test
    runs-on: ubuntu-24.04
    timeout-minutes: 25

    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Validate Compose configuration
        run: docker compose config --quiet

      - name: Build production image
        run: docker build --tag graffiti-detection-ai:ci .
