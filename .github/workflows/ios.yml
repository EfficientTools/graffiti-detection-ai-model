name: Apple Client

on:
  workflow_call:
  push:
    branches: [main]
    paths:
      - ios/GraffitiGuard/**
      - scripts/export_coreml.py
      - pyproject.toml
      - .github/workflows/ios.yml
  pull_request:
    paths:
      - ios/GraffitiGuard/**
      - scripts/export_coreml.py
      - pyproject.toml
      - .github/workflows/ios.yml
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: apple-client-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build and test iPhone and iPad app
    runs-on: macos-26
    timeout-minutes: 25

    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Show Apple toolchain
        run: xcodebuild -version

      - name: Check Swift formatting
        run: |
          xcrun swift-format lint \
            --strict \
            --recursive \
            --configuration ios/GraffitiGuard/.swift-format \
            ios/GraffitiGuard/GraffitiGuard \
            ios/GraffitiGuard/GraffitiGuardTests

      - name: Build universal simulator app
        run: |
          xcodebuild \
            -project ios/GraffitiGuard/GraffitiGuard.xcodeproj \
            -scheme GraffitiGuard \
            -configuration Debug \
            -destination 'generic/platform=iOS Simulator' \
            -derivedDataPath /tmp/GraffitiGuardBuildDerivedData \
            CODE_SIGNING_ALLOWED=NO \
            clean build

      - name: Build unsigned release app
        run: |
          xcodebuild \
            -project ios/GraffitiGuard/GraffitiGuard.xcodeproj \
            -scheme GraffitiGuard \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -derivedDataPath /tmp/GraffitiGuardReleaseDerivedData \
            CODE_SIGNING_ALLOWED=NO \
            clean build

      - name: Select test simulators
        shell: bash
        run: |
          read -r iphone_id ipad_id < <(xcrun simctl list devices available --json | python3 -c '
          import json, sys
          devices = json.load(sys.stdin)["devices"]
          available = [
              device
              for runtime in devices.values()
              for device in runtime
              if device.get("isAvailable")
          ]
          iphone = next(device["udid"] for device in available if device["name"].startswith("iPhone"))
          ipad = next(device["udid"] for device in available if device["name"].startswith("iPad"))
          print(iphone, ipad)
          ')
          test -n "$iphone_id"
          test -n "$ipad_id"
          echo "IPHONE_TEST_DEVICE_ID=$iphone_id" >> "$GITHUB_ENV"
          echo "IPAD_TEST_DEVICE_ID=$ipad_id" >> "$GITHUB_ENV"

      - name: Run iPhone and iPad tests
        run: |
          xcodebuild \
            -project ios/GraffitiGuard/GraffitiGuard.xcodeproj \
            -scheme GraffitiGuard \
            -configuration Debug \
            -destination "platform=iOS Simulator,id=$IPHONE_TEST_DEVICE_ID" \
            -destination "platform=iOS Simulator,id=$IPAD_TEST_DEVICE_ID" \
            -derivedDataPath /tmp/GraffitiGuardTestDerivedData \
            -resultBundlePath /tmp/GraffitiGuardTests.xcresult \
            -enableCodeCoverage YES \
            test
